meta:
  source_loader:
    path: "{{pipeline_path}}"

tasks:
   
  - name: copy
    source: scp.sh
    product:
      output_read1: "{{cwd}}/read1.fastq"
      output_read2: "{{cwd}}/read2.fastq"
    params:
      remote_path: "{{remote_path}}"
      user: "{{user}}"
      url: "{{url}}"
      input_read1: "{{input_read1}}"
      input_read2: "{{input_read2}}"

  - name: quality
    source: quality.sh
    params:
      primers: "{{primers}}"
      quality_threshold: "{{quality_threshold}}"
    product:
      output_read1: "{{cwd}}/read1.qc.fastq"
      output_read2: "{{cwd}}/read2.qc.fastq"

  - name: map
    source: map.sh
    params:
      blastdb: "{{blastdb}}"
      threads: 10
    product:
      hits: "{{cwd}}/blast-hits.{{library_name}}.tab"
      
  #     # rdf: blast-metadata.{{library_name}}.rdf

  - name: filter
    source: filter.py
    product: 
      species_hits: "{{cwd}}/species-hits.{{library_name}}.tab"
      nb: "{{cwd}}/species-hits.{{library_name}}.ipynb"
      # species_hits_rdf: species-hits.{{library_name}}.rdf
      # filtered_reads: blast-filtered-reads.{{library_name}}.tab
    params:
      library_name: "{{library_name}}"
      identity_threshold: 100
      length_threshold: 125
      species_reference: "{{species_reference}}"