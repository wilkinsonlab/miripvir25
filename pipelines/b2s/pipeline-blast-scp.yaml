meta:
  source_loader:
    path: "{{pipeline_path}}"

tasks:
   
  - name: copy
    source: scp.sh
    product:
      output_read1: "{{cwd}}/read1.fastq"
      output_read2: "{{cwd}}/read2.fastq"
    params:
      remote_path: "{{remote_path}}"
      user: "{{user}}"
      url: "{{url}}"
      input_read1: "{{input_read1}}"
      input_read2: "{{input_read2}}"

  - name: quality
    source: quality.sh
    params:
      primers: "{{primers}}"
      quality_threshold: "{{quality_threshold}}"
      threads: "{{threads}}"
    product:
      output_read1: "{{cwd}}/read1.qc.fastq"
      output_read2: "{{cwd}}/read2.qc.fastq"

  - name: blast-map
    source: blast-map.sh
    params:
      blastdb: "{{blastdb}}"
      threads: "{{threads}}"
      evalue: "{{evalue}}"
    product:
      output_read1: "{{cwd}}/blast-hits.{{library_name}}1.tab"
      output_read2: "{{cwd}}/blast-hits.{{library_name}}2.tab"
      
  #     # rdf: blast-metadata.{{library_name}}.rdf

  - name: blast-filter
    source: run.filter_blast
    product: 
      species_hits: "{{cwd}}/species-hits.{{library_name}}.csv"
      nb: "{{cwd}}/species-hits.{{library_name}}.ipynb"
      # species_hits_rdf: species-hits.{{library_name}}.rdf
      # filtered_reads: blast-filtered-reads.{{library_name}}.tab
    params:
      library_name: "{{library_name}}"
      query_coverage: "{{query_coverage}}"
      length_threshold: "{{length_threshold}}"
      lookup_table: "{{lookup_table}}"