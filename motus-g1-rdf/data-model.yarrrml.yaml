prefixes:
  dce: http://purl.org/dc/elements/1.1/
  dwc: http://rs.tdwg.org/dwc/terms/
  emi: https://purl.org/emi#
  fao: https://w3id.org/fao-ipgr/multi-passport-descriptor.owl#
  mvrhit: http://localhost:8000/hit/
  mvrhost: http://localhost:8000/host/
  mvrlib: http://localhost:8000/library/
  mvrrun: http://localhost:8000/run/
  mvront: http://localhost:8000/ont/
  mvrsite: http://localhost:8000/site/
  mvrtaxon: http://localhost:8000/taxon/
  mvrprt: http://localhost:8000/protocol/
  wlo: http://purl.org/ontology/wo/
  uniprotrdfs: http://purl.uniprot.org/core/
  ncit: http://purl.obolibrary.org/obo/NCIT_
  rdfs: http://www.w3.org/2000/01/rdf-schema#

  
mappings:
  site:
    sources:
      - ['library.json~jsonpath', '$.site[*]']
    s: mvrsite:$(Site_code)
    po:
      - p: a
        o: 
          value: mvront:Site
          type: iri
      - p: a
        o: 
          value: fao:$(Habitat_type)
          type: iri
      - p: rdfs:label
        o:
          value: $(Site_code)
          type: xsd::string
      - p: dwc:decimalLatitude
        o: 
          value: $(Latitude)
          type: xsd::string
      - p: dwc:decimalLongitude
        o: 
          value: $(Longitude)
          type: xsd::string
      - p: fao:0000122
        o: 
          value: $(Location)
          type: xsd:string
      - p: wlo:habitat 
        o: 
          value: $(Habitat)
          type: xsd:string
  library:
      sources:
        - ['library.json~jsonpath', '$.library[*]']
      s: mvrlib:$(Library_code)
      po:
        - p: a
          o: 
            value: mvront:Library
            type: iri
        - p: rdfs:label
          o: 
            value: $(Library_code)
            type: xsd::string
        - p: mvront:nextracts
          o: 
            value: $(No_extracts)
            type: xsd::integer

  
  library_site:
      sources:
        - ['library.json~jsonpath','$.library_site[*]']
      s: mvrlib:$(Library_code)
      po:
        - p: mvront:Sampled_from
          o: 
            value: mvrsite:$(Site_code)
            type: iri
  date:
    sources:
      - ['library.json~jsonpath','$.library_dates[*]']
    s: mvrlib:$(Library_code)
    po:
      - p: dce:date
        o: 
          value: $(Date)
          type: xsd:date

  host_library:
    sources:
      - ['host.json~jsonpath', '$.host_library[*]']
    s: mvrlib:$(Library_code)
    po:
      - p: mvront:Host
        o: 
          value: mvrtaxon:$(code)
          type: iri

  library_detection_runs:
    sources:
      - ['library.json~jsonpath','$.library_dates[*]']
    s: mvrlib:$(Library_code)
    po:
      - p: mvront:Run
        o: mvrrun:$(Library_code)_0000 # Virus

      - p: mvront:Run
        o: mvrrun:$(Library_code)_0001 # Bacteria

  detection_runs_virus:
    sources:
      - ['library.json~jsonpath','$.library_dates[*]']
    s: mvrrun:$(Library_code)_0000
    po:
      - p: a
        o: mvront:DetectionRun # Virus

      - p: mvront:Protocol
        o: BLAST01

  detection_runs_bact:
    sources:
      - ['library.json~jsonpath','$.library_dates[*]']
    s: mvrrun:$(Library_code)_0001
    po:
      - p: a
        o: mvront:DetectionRun # Virus

      - p: mvront:Protocol
        o: MOTUSG1 
      

  host_taxon:
    sources:
      - ['host.json~jsonpath', '$.host[*]']
    s: mvrtaxon:$(code)
    po:
      - p: a
        o: 
          value: mvront:Taxon
          type: iri
      - p: rdfs:label
        o: 
          value: $(Host_taxon)
          type: xsd::string
      - p: dwc:scientificName
        o:
          value: $(Host_taxon)
          type: xsd::string

      - p: dwc:taxonID
        o:
          value: $(taxid)
          type: xsd::string

      - p: uniprotrdfs:Kingdom
        o:
          value: Plant
          type: xsd::string

  bact_detections:
    sources:
      - ['bacteria.json~jsonpath', '$.hits[*]']
    s: mvrrun:$(Library)_0001
    po:
      - p: mvront:Predicts 
        o:
          value: mvrhit:$(Hit_code)
          type: iri
    
  bact_hit:
    sources:
      - ['bacteria.json~jsonpath', '$.hits[*]']
    
    s: mvrhit:$(Hit_code)
    po:
      - p: a
        o: 
          value: mvront:Hit
          type: iri
      
      - p: rdfs:label
        o:
          value: $(Hit_code)
          type: xsd::string

      - p: mvront:OTU
        o:
          value: mvrtaxon:$(Taxon_code)
          type: iri
      
  
  bact_taxon:
    sources:
      - ['bacteria.json~jsonpath', '$.taxon[*]']

    s: mvrtaxon:$(Taxon_code)
    po:
      - p: a
        o: 
          value: mvront:Taxon
          type: iri

      - p: rdfs:label
        o:
          value: $(scientific_name)
          type: xsd::string

      - p: dwc:scientificName
        o:
          value: $(scientific_name)
          type: literal
      - p: dwc:taxonID
        o:
          value: $(taxonid)
          type: xsd::string
      - p: uniprotrdfs:Kingdom
        o:
          value: Bacteria
          type: xsd::string

      - p: mvront:GTDBGenomeReference
        o:
          value: $(gtdb_genome_representative)
          type: xsd::string

      - p: mvront:is_pab
        o:
          value: $(is_pab)
          type: xsd::string

      - p: mvront:pab_type
        o:
          value: $(pab_type)
          type: xsd::string
        

  virus_detections:
    sources:
      - ['virus.json~jsonpath', '$.hits[*]']
    s: mvrrun:$(Library)_0000
    po:
      - p: mvront:Predicts
        o:
          value: mvrhit:$(Hit_code)
          type: iri
    
  virus_hit:
    sources:
      - ['virus.json~jsonpath', '$.hits[*]']
    
    s: mvrhit:$(Hit_code)
    po:
      - p: a
        o: 
          value: mvront:Hit
          type: iri

      - p: rdfs:label
        o:
          value: $(Hit_code)
          type: xsd::string

      - p: mvront:OTU
        o:
          value: mvrtaxon:$(Taxon_code)
          type: iri
  
  virus_taxon:
    sources:
      - ['virus.json~jsonpath', '$.virus[*]']

    s: mvrtaxon:$(Taxon_code)
    po:
      - p: a
        o: 
          value: mvront:Taxon
          type: iri
      
      - p: rdfs:label
        o:
          value: $(scientific_name)
          type: xsd::string

      - p: dwc:scientificName
        o:
          value: $(Scientific_name)
          type: literal
      - p: dwc:taxonID
        o:
          value: $(taxid)
          type: xsd::string
      - p: uniprotrdfs:Kingdom
        o:
          value: Virus
          type: xsd::string
      - p: ncit:C25402 # ACCESSION NUMBER
        o:
          value: $(NCBI_accession)
          type: xsd::string
      - p: rdf:label
        o: 
          value: $(label)
          type: xsd::string