prefixes:
  dce: http://purl.org/dc/elements/1.1/
  dwc: http://rs.tdwg.org/dwc/terms/
  emi: https://purl.org/emi#
  fao: https://w3id.org/fao-ipgr/multi-passport-descriptor.owl#
  mvrhit: http://localhost:8000/hit/
  mvrhost: http://localhost:8000/host/
  mvrlib: http://localhost:8000/library/
  mvront: http://localhost:8000/ont/
  mvrsite: http://localhost:8000/site/
  mvrcol: http://localhost:8000/collection/
  mvrtaxon: http://localhost:8000/taxon/
  wlo: http://purl.org/ontology/wo/
  uniprotrdfs: http://purl.uniprot.org/core/
  ncit: http://purl.obolibrary.org/obo/NCIT_
  rdfs: http://www.w3.org/2000/01/rdf-schema#

  
mappings:
  site:
    sources:
      - ['library.json~jsonpath', '$.site[*]']
    s: mvrsite:$(Site_code)
    po:
      - p: a
        o: 
          value: mvront:Site
          type: iri
      - p: a
        o: 
          value: fao:$(Habitat_type)
          type: iri
      - p: rdfs:label
        o:
          value: $(Site_code)
          type: xsd::string
      - p: dwc:decimalLatitude
        o: 
          value: $(Latitude)
          type: xsd::string
      - p: dwc:decimalLongitude
        o: 
          value: $(Longitude)
          type: xsd::string
      - p: fao:0000122
        o: 
          value: $(Location)
          type: xsd:string
      - p: wlo:habitat 
        o: 
          value: $(Habitat)
          type: xsd:string
  library:
      sources:
        - ['library.json~jsonpath', '$.library[*]']
      s: mvrlib:$(Library_code)
      po:
        - p: a
          o: 
            value: mvront:Library
            type: iri
        - p: rdfs:label
          o: 
            value: $(Library_code)
            type: xsd::string
        - p: mvront:nextracts
          o: 
            value: $(No_extracts)
            type: xsd::integer

  
  library_site:
      sources:
        - ['library.json~jsonpath','$.library_site[*]']
      s: mvrlib:$(Library_code)
      po:
        - p: mvront:Sampled_from
          o: 
            value: mvrsite:$(Site_code)
            type: iri
  date:
    sources:
      - ['library.json~jsonpath','$.library_dates[*]']
    s: mvrlib:$(Library_code)
    po:
      - p: dce:date
        o: 
          value: $(Date)
          type: xsd:date

  host:
    sources:
      - ['host_library.json~jsonpath', '$.host[*]']
    s: mvrhost:$(Taxon_code)
    po:
      - p: a
        o: 
          value: mvront:Host
          type: iri
      - p: rdfs:label
        o:
          value: $(Taxon_code)
          type: xsd::string
      - p: uniprotrdfs:Taxon
        o: 
          value: mvrtaxon:$(taxid)
          type: iri

  host_taxon:
    sources:
      - ['host_library.json~jsonpath', '$.host[*]']
    s: mvrtaxon:$(taxid)
    po:
      - p: a
        o: 
          value: emi:Taxon
          type: iri
      - p: rdfs:label
        o: 
          value: $(taxid)
          type: xsd::string
      - p: dwc:scientificName
        o:
          value: $(Host_taxon)
          type: xsd::string

      - p: dwc:taxonID
        o:
          value: $(taxid)
          type: xsd::string
      - p: uniprotrdfs:Kingdom
        o:
          value: Plant
          type: xsd::string


  host_library:
    sources:
      - ['host_library.json~jsonpath', '$.host_library[*]']
    s: mvrlib:$(Library_code)
    po:
      - p: mvront:Obtained_from
        o:
          value: mvrhost:$(Taxon_code)
          type: iri
  
  bact_detections:
    sources:
      - ['bacteria_library.json~jsonpath', '$.hits[*]']
    s: mvrlib:$(Library)
    po:
      - p: mvront:Reported
        o:
          value: mvrhit:$(Hit_code)
          type: iri
    
  bact_hit:
    sources:
      - ['bacteria_library.json~jsonpath', '$.hits[*]']
    
    s: mvrhit:$(Hit_code)
    po:
      - p: a
        o: 
          value: emi:Organism
          type: iri
      
      - p: rdfs:label
        o:
          value: $(Hit_code)
          type: xsd::string

      - p: uniprotrdfs:Taxon
        o:
          value: mvrtaxon:$(Taxon_code)
          type: iri
      
      - p: mvront:BelongsTo
        o:
          value: mvrcol:0000
          type: iri
  
  bact_taxon:
    sources:
      - ['bacteria_library.json~jsonpath', '$.taxon[*]']

    s: mvrtaxon:$(Taxon_code)
    po:
      - p: a
        o: 
          value: emi:Taxon
          type: iri

      - p: rdfs:label
        o:
          value: $(Taxon_code)
          type: xsd::string

      - p: dwc:scientificName
        o:
          value: $(scientific_name)
          type: literal
      - p: dwc:taxonID
        o:
          value: $(taxonid)
          type: xsd::string
      - p: uniprotrdfs:Kingdom
        o:
          value: Bacteria
          type: xsd::string

      - p: mvront:GTDBGenomeReference
        o:
          value: $(gtdb_genome_representative)
          type: xsd::string

      - p: mvront:is_pab
        o:
          value: $(is_pab)
          type: xsd::string

      - p: mvront:pab_type
        o:
          value: $(pab_type)
          type: xsd::string
        

  virus_detections:
    sources:
      - ['virus_library.json~jsonpath', '$.hits[*]']
    s: mvrlib:$(Library)
    po:
      - p: mvront:Reported
        o:
          value: mvrhit:$(Hit_code)
          type: iri
    
  virus_hit:
    sources:
      - ['virus_library.json~jsonpath', '$.hits[*]']
    
    s: mvrhit:$(Hit_code)
    po:
      - p: a
        o: 
          value: emi:Organism
          type: iri

      - p: rdfs:label
        o:
          value: $(Hit_code)
          type: xsd::string

      - p: uniprotrdfs:Taxon
        o:
          value: mvrtaxon:$(Taxon_code)
          type: iri
      
      - p: mvront:BelongsTo
        o:
          value: mvrcol:0001
          type: iri
  
  virus_taxon:
    sources:
      - ['virus_library.json~jsonpath', '$.virus[*]']

    s: mvrtaxon:$(Taxon_code)
    po:
      - p: a
        o: 
          value: emi:Taxon
          type: iri
      
      - p: rdfs:label
        o:
          value: $(Taxon_code)
          type: xsd::string

      - p: dwc:scientificName
        o:
          value: $(Scientific_name)
          type: literal
      - p: dwc:taxonID
        o:
          value: $(taxid)
          type: xsd::string
      - p: uniprotrdfs:Kingdom
        o:
          value: Virus
          type: xsd::string
      - p: ncit:C25402 # ACCESSION NUMBER
        o:
          value: $(NCBI_accession)
          type: xsd::string
      - p: rdf:label
        o: 
          value: $(label)
          type: xsd::string